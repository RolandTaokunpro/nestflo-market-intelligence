services:
  - type: web
    name: nestflo-market-intelligence
    env: python
    region: frankfurt
    plan: free
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && pip install -r requirements.txt
    startCommand: cd backend && python3 main.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
